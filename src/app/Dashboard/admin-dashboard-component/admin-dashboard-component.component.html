<div class="h-100">
  <p-toast/>
  <form [formGroup]="form" class="p-4">

    <div class="flex gap-4 mb-4">
      <p-radioButton name="mode" value="Regular_Login" label="Single Factor Login" formControlName="mode"></p-radioButton>&nbsp;
      <p-radioButton name="mode" value="Two_Factor_Authentication" label="Two Factor Login" formControlName="mode"></p-radioButton>&nbsp;
      <p-radioButton name="mode" value="Multi_Factor" label="Multi Factor Login" formControlName="mode"></p-radioButton>
    </div>

    <div *ngIf="form.get('mode')?.value === 'Regular_Login'" formGroupName="general" class="p-fluid">
      <label for="generalType">Type</label>
      <p-multiSelect
      id="generalType"
      formControlName="type"
      [options]="typesOptions"
      optionLabel="label"
      optionValue="value"
      display="chip"
      placeholder="Select Types"
      appendTo="body">
</p-multiSelect>

      <label for="generalName">Name</label>

<p-multiSelect
      id="generalName"
      formControlName="name"
      [options]="generalNamesOptions"
      optionLabel="label"
      optionValue="value"
      placeholder="Select Providers"
      display="chip" [maxSelectedLabels]="100"
      appendTo="body">
</p-multiSelect>
    </div>

    <!-- ========== TWO FACTOR ========== -->
    <div *ngIf="form.get('mode')?.value === 'Two_Factor_Authentication'" formArrayName="twoFactor">
      <p-table [value]="twoFactor.controls" class="mt-3">
        <ng-template pTemplate="header">
          <tr><th>SNo</th><th>Type</th><th>Name</th><th>Action</th></tr>
        </ng-template>

        <ng-template pTemplate="body" let-row let-i="rowIndex">
          <tr [formGroupName]="i">
            <td>{{ i + 1 }}</td>

            <td>
              <p-dropdown formControlName="type"
                          [options]="typesOptions"
                          optionLabel="label"
                          optionValue="value"
                          placeholder="Select Type"
                          appendTo="body">
              </p-dropdown>
            </td>

            <td>
  <p-dropdown
    formControlName="name"
    [options]="getAvailableNames(twoFactor.controls[i].get('type')?.value, i, 'two')"
    optionLabel="label"
    optionValue="value"
    placeholder="Select Name"
    appendTo="body">
  </p-dropdown>
</td>

            <td>
              <button pButton type="button" icon="pi pi-trash" class="p-button-danger p-button-text"
                      (click)="removeTwoFactorRow(i)"></button>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>

    <!-- ========== MULTI FACTOR ========== -->
    <div *ngIf="form.get('mode')?.value === 'Multi_Factor'" formArrayName="multiFactor">
      <div class="flex justify-content-end mb-2">
        <button pButton type="button" label="Add Row" icon="pi pi-plus" (click)="addMultiRow()"></button>
      </div>

      <p-table [value]="multiFactor.controls">
        <ng-template pTemplate="header">
          <tr><th>SNo</th><th>Type</th><th>Name</th><th>Action</th></tr>
        </ng-template>

        <ng-template pTemplate="body" let-row let-i="rowIndex">
          <tr [formGroupName]="i">
            <td>{{ i + 1 }}</td>

            <td>
              <p-dropdown formControlName="type"
                          [options]="typesOptions"
                          optionLabel="label"
                          optionValue="value"
                          placeholder="Select Type"
                          appendTo="body">
              </p-dropdown>
            </td>

            <td>
              <p-dropdown formControlName="name"
                          [options]="namesByTypeMap[multiFactor.controls[i].get('type')?.value]"
                          optionLabel="label"
                          optionValue="value"
                          placeholder="Select Name"
                          appendTo="body">
              </p-dropdown>
            </td>

            <td>
              <button pButton type="button" icon="pi pi-trash" class="p-button-danger p-button-text"
                      (click)="removeMultiRow(i)"></button>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>

    <!-- SUBMIT -->
    <div class="mt-4">
      <button pButton type="button" label="Submit" [disabled]="isSubmitDisabled()" (click)="submit()"></button>
    </div>

  </form>
</div>
